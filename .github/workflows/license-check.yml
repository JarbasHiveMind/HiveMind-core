name: License Check
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  license_check:
    uses: OpenVoiceOS/gh-automations/.github/workflows/license-check.yml@dev
    secrets: inherit
    with:
      # hivemind-core is intentionally AGPL-3.0; exclude it from the dependency audit
      exclude_packages: "^hivemind.core.*"
