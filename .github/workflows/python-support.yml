# NOTE: python-support.yml@dev is deprecated. This file calls build-tests.yml@dev instead.
# You can rename this file to build-tests.yml if you don't already have one.
name: Build Tests

on:
  pull_request:
    branches: [dev, master, main]
  workflow_dispatch:

jobs:
  build_tests:
    uses: OpenVoiceOS/gh-automations/.github/workflows/build-tests.yml@dev
    secrets: inherit
    with:
      package_name: 'hivemind_core'
      version_file: 'hivemind_core/version.py'
      python_versions: '["3.10", "3.11", "3.12", "3.13", "3.14"]'
      test_path: 'test/'
